# zyn integration for kitty.
# Prereq: $EDITOR=zyn set in your shell profile.

# Detect file:// URLs (including OSC 8 hyperlinks from ripgrep, lazygit,
# eslint, gcc, etc.) and make them clickable.
detect_urls yes
url_prefixes file http https

# When a URL is opened (click or kitty action), dispatch through
# open-actions.conf rules.
open_url_with default

# Hints kitten: keyboard-driven path picking for plain text paths
# (the path:line:col strings that aren't OSC 8 hyperlinks).
#
# kitty_mod defaults to ctrl+shift.
#   ctrl+shift+p, then f  -> pick any visible path, open in zyn.
#   ctrl+shift+p, then l  -> pick a path:line, open at that line.
map kitty_mod+p>f kitten hints --type path --program "launch --type=background zyn"
map kitty_mod+p>l kitten hints --type linenum --linenum-action background zyn {path}:{line}

# Open new OS windows (e.g. Hyprland panes) in the same working directory
map kitty_mod+n new_os_window_with_cwd
