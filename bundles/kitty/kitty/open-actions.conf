# Route clicked file:// URLs to zyn.
#
# Three cases, matched top-to-bottom:
#   1. file:///path/to/file#42:5     direct line[:col] fragment
#   2. file:///path/to/file#L42:5    GitHub-style L-prefixed fragment
#   3. file:///path/to/file          no fragment, open at top

protocol file
fragment_matches ^\d+(:\d+)?$
action launch --type=background zyn ${FILE_PATH}:${FRAGMENT}

protocol file
fragment_matches ^L\d+(:\d+)?$
action launch --type=background sh -c 'zyn "$1:${2#L}"' _ ${FILE_PATH} ${FRAGMENT}

protocol file
action launch --type=background zyn ${FILE_PATH}
